<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>plexly</title>
  <link href="https://fonts.googleapis.com/css2?family=Zen+Antique+Soft&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { width: 100%; height: 100%; overflow: hidden; }
    body { background: #06080f; font-family: 'DM Mono', monospace; cursor: none; }

    @keyframes flicker {
      0%, 89%, 91%, 93%, 95%, 100% { opacity: 1; }
      90%, 92%, 94% { opacity: 0.4; }
    }
    @keyframes drift {
      0%   { transform: translateY(0) translateX(0); opacity: 0; }
      8%   { opacity: 0.9; }
      92%  { opacity: 0.6; }
      100% { transform: translateY(-105vh) translateX(25px); opacity: 0; }
    }
    @keyframes scanline {
      0%   { transform: translateY(-4px); }
      100% { transform: translateY(100vh); }
    }
    @keyframes fadeInUp {
      from { opacity: 0; transform: translateY(22px); }
      to   { opacity: 1; transform: translateY(0); }
    }
    @keyframes ember {
      0%   { transform: translate(var(--dx), var(--dy)) scale(1); opacity: 1; }
      100% { transform: translate(calc(var(--dx)*2.5), calc(var(--dy)*2.5 - 50px)) scale(0); opacity: 0; }
    }
    @keyframes glitch-clip {
      0%,100% { clip-path: none; transform: translate(0); }
      20% { clip-path: polygon(0 12%, 100% 12%, 100% 32%, 0 32%); transform: translate(-4px); }
      21% { clip-path: none; transform: translate(0); }
      60% { clip-path: polygon(0 58%, 100% 58%, 100% 78%, 0 78%); transform: translate(4px); }
      61% { clip-path: none; transform: translate(0); }
    }
  </style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<script type="text/babel">
const { useState, useEffect, useRef, useCallback } = React;

/* ─── helpers ─── */
const rand = (a, b) => Math.random() * (b - a) + a;

/* ─── floating ember particle ─── */
function Ember({ i }) {
  const s = {
    position: 'absolute',
    bottom: -6,
    left: `${rand(0,100)}%`,
    width:  rand(1.5, 3.5),
    height: rand(1.5, 3.5),
    borderRadius: '50%',
    background: `hsl(${rand(330,360)},${rand(60,90)}%,${rand(55,72)}%)`,
    boxShadow: '0 0 6px currentColor',
    animation: `drift ${rand(7,18)}s linear ${rand(0,14)}s infinite`,
    opacity: 0,
    pointerEvents: 'none',
  };
  return <div style={s} />;
}

/* ─── click-burst sparks ─── */
function Burst({ x, y, id, onDone }) {
  useEffect(() => { const t = setTimeout(onDone, 900); return () => clearTimeout(t); }, []);
  return (
    <>
      {Array.from({length:10},(_,i)=>{
        const angle = (360/10)*i;
        const rad   = angle * Math.PI / 180;
        const dist  = rand(25,55);
        const dx    = Math.cos(rad)*dist;
        const dy    = Math.sin(rad)*dist;
        return (
          <div key={i} style={{
            position:'fixed', left:x, top:y, pointerEvents:'none', zIndex:999,
            width: rand(2,5), height: rand(2,5), borderRadius:'50%',
            background:`hsl(${rand(0,28)},90%,${rand(55,72)}%)`,
            boxShadow:'0 0 6px currentColor',
            '--dx': `${dx}px`, '--dy': `${dy}px`,
            animation:`ember 0.8s ease-out ${i*25}ms forwards`,
            transform:'translate(-50%,-50%)',
          }}/>
        );
      })}
    </>
  );
}

/* ─── custom cursor ─── */
function Cursor({ pos }) {
  const [trail, setTrail] = useState([]);
  const prev = useRef(pos);
  useEffect(() => {
    if (prev.current.x === pos.x && prev.current.y === pos.y) return;
    prev.current = pos;
    setTrail(t => [{ ...pos, id: Date.now() }, ...t.slice(0,9)]);
  }, [pos.x, pos.y]);
  return (
    <div style={{position:'fixed',inset:0,pointerEvents:'none',zIndex:9999}}>
      <div style={{
        position:'fixed', left:pos.x, top:pos.y,
        width:8, height:8, borderRadius:'50%',
        background:'rgba(210,70,70,0.95)',
        boxShadow:'0 0 14px rgba(210,70,70,0.8)',
        transform:'translate(-50%,-50%)',
      }}/>
      {trail.map((p,i)=>(
        <div key={p.id} style={{
          position:'fixed', left:p.x, top:p.y,
          width: Math.max(1, 6-i*0.5), height: Math.max(1, 6-i*0.5),
          borderRadius:'50%',
          background:`rgba(200,60,60,${Math.max(0, 0.45-i*0.045)})`,
          transform:'translate(-50%,-50%)',
        }}/>
      ))}
    </div>
  );
}

/* ─── glitch text on hover ─── */
function GlitchText({ children, style={} }) {
  const [g, setG] = useState(false);
  return (
    <span
      onMouseEnter={()=>{ setG(true); setTimeout(()=>setG(false),420); }}
      style={{ position:'relative', display:'inline-block', cursor:'none', ...style,
        animation: g ? 'glitch-clip 0.42s steps(1) forwards' : 'none' }}
    >
      {children}
      {g && <>
        <span style={{
          position:'absolute',inset:0,color:'rgba(255,70,70,0.65)',
          clipPath:'polygon(0 15%,100% 15%,100% 35%,0 35%)',
          transform:'translate(-4px)',pointerEvents:'none',
        }}>{children}</span>
        <span style={{
          position:'absolute',inset:0,color:'rgba(60,190,255,0.45)',
          clipPath:'polygon(0 62%,100% 62%,100% 80%,0 80%)',
          transform:'translate(4px)',pointerEvents:'none',
        }}>{children}</span>
      </>}
    </span>
  );
}

/* ─── nav link ─── */
function NavLink({ children, href='#' }) {
  const [h, setH] = useState(false);
  return (
    <a href={href}
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{
        color: h ? 'rgba(225,105,105,0.95)' : 'rgba(170,150,155,0.4)',
        textDecoration:'none', fontSize:'0.7rem', letterSpacing:'0.2em',
        textTransform:'uppercase', transition:'color 0.3s',
        borderBottom: h ? '1px solid rgba(225,105,105,0.4)' : '1px solid transparent',
        paddingBottom:2, cursor:'none',
      }}
    >{children}</a>
  );
}

/* ─── CTA button ─── */
function Btn({ label, primary }) {
  const [h, setH] = useState(false);
  return (
    <a href="#"
      onMouseEnter={()=>setH(true)} onMouseLeave={()=>setH(false)}
      style={{
        display:'inline-block', padding:'0.75rem 2rem',
        fontSize:'0.7rem', letterSpacing:'0.2em', textTransform:'uppercase',
        textDecoration:'none', cursor:'none', transition:'all 0.3s',
        ...(primary ? {
          background: h ? 'rgba(200,60,60,0.22)' : 'rgba(200,60,60,0.1)',
          border:`1px solid rgba(200,60,60,${h?0.65:0.28})`,
          color:`rgba(235,155,155,${h?1:0.75})`,
          boxShadow: h ? '0 0 24px rgba(200,60,60,0.14)' : 'none',
        }:{
          background:'transparent',
          border:`1px solid rgba(110,95,115,${h?0.5:0.22})`,
          color:`rgba(155,140,150,${h?0.9:0.45})`,
        }),
      }}
    >{label}</a>
  );
}

/* ─── status dot ─── */
function Dot() {
  const [on, setOn] = useState(true);
  useEffect(()=>{ const i=setInterval(()=>setOn(v=>!v), rand(1800,3600)); return()=>clearInterval(i); },[]);
  return <span style={{
    display:'inline-block', width:6, height:6, borderRadius:'50%',
    background: on ? 'rgba(160,215,100,0.95)' : 'rgba(160,215,100,0.2)',
    boxShadow: on ? '0 0 8px rgba(160,215,100,0.7)' : 'none',
    transition:'all 0.5s', marginRight:8, verticalAlign:'middle',
  }}/>;
}

/* ─── main app ─── */
function App() {
  const [cur,  setCur]    = useState({x:-200,y:-200});
  const [bursts, setBursts] = useState([]);
  const [loaded, setLoaded] = useState(false);

  useEffect(()=>{
    const t = setTimeout(()=>setLoaded(true),80);
    const mv = e => setCur({x:e.clientX,y:e.clientY});
    window.addEventListener('mousemove',mv);
    return()=>{ clearTimeout(t); window.removeEventListener('mousemove',mv); };
  },[]);

  const click = useCallback(e=>{
    const id = Date.now()+Math.random();
    setBursts(b=>[...b,{id,x:e.clientX,y:e.clientY}]);
  },[]);

  const removeBurst = useCallback(id=>setBursts(b=>b.filter(x=>x.id!==id)),[]);

  const fade = (delay, extra={}) => ({
    opacity: loaded ? 1 : 0,
    animation: loaded ? `fadeInUp 0.9s ease ${delay}s both` : 'none',
    ...extra,
  });

  return (
    <div onClick={click} style={{
      width:'100vw', height:'100vh', position:'relative', overflow:'hidden',
      background:'radial-gradient(ellipse at 28% 65%, #0d0814 0%, #06080f 58%, #080610 100%)',
    }}>

      {/* scanline texture */}
      <div style={{position:'absolute',inset:0,pointerEvents:'none',zIndex:8,
        background:'repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.032) 2px,rgba(0,0,0,0.032) 4px)'}}/>

      {/* moving scanline */}
      <div style={{position:'absolute',left:0,right:0,height:2,zIndex:9,pointerEvents:'none',
        background:'linear-gradient(90deg,transparent,rgba(200,70,70,0.04),transparent)',
        animation:'scanline 9s linear infinite'}}/>

      {/* vignette */}
      <div style={{position:'absolute',inset:0,pointerEvents:'none',
        background:'radial-gradient(ellipse at center,transparent 38%,rgba(0,0,0,0.78) 100%)'}}/>

      {/* ambient glows */}
      <div style={{position:'absolute',top:'52%',left:'18%',width:520,height:320,pointerEvents:'none',
        background:'radial-gradient(ellipse,rgba(155,35,55,0.09) 0%,transparent 70%)',filter:'blur(50px)'}}/>
      <div style={{position:'absolute',top:'12%',right:'8%',width:420,height:420,pointerEvents:'none',
        background:'radial-gradient(ellipse,rgba(70,35,130,0.07) 0%,transparent 70%)',filter:'blur(65px)'}}/>

      {/* floating embers */}
      {Array.from({length:36},(_,i)=><Ember key={i} i={i}/>)}

      {/* click bursts */}
      {bursts.map(b=><Burst key={b.id} x={b.x} y={b.y} id={b.id} onDone={()=>removeBurst(b.id)}/>)}

      {/* cursor */}
      <Cursor pos={cur}/>

      {/* ── NAV ── */}
      <nav style={{position:'fixed',top:0,left:0,right:0,zIndex:100,
        display:'flex',justifyContent:'space-between',alignItems:'center',
        padding:'1.8rem 3.5rem',
        opacity: loaded?1:0, transition:'opacity 1s ease 0.2s'}}>
        <span style={{
          fontFamily:"'Zen Antique Soft',serif",fontSize:'0.92rem',
          color:'rgba(215,170,170,0.5)',letterSpacing:'0.12em',
          animation:'flicker 9s infinite 2s',
        }}>ヨミビトシラズ</span>
        <div style={{display:'flex',gap:'2.5rem'}}>
          <NavLink>about</NavLink>
          <NavLink>projects</NavLink>
          <NavLink>contact</NavLink>
        </div>
      </nav>

      {/* ── HERO ── */}
      <main style={{
        position:'absolute',inset:0,display:'flex',flexDirection:'column',
        justifyContent:'center',padding:'0 3.5rem',paddingTop:'3rem',
      }}>

        {/* status */}
        <div style={{marginBottom:'2.2rem', ...fade(0.5)}}>
          <span style={{fontSize:'0.68rem',letterSpacing:'0.2em',textTransform:'uppercase',color:'rgba(150,200,110,0.72)'}}>
            <Dot/>available for work
          </span>
        </div>

        {/* name */}
        <h1 style={{
          fontFamily:"'DM Mono',monospace",fontWeight:300,
          fontSize:'clamp(4.2rem,11.5vw,10.5rem)',
          lineHeight:0.88,letterSpacing:'-0.03em',
          color:'rgba(242,228,228,0.93)',marginBottom:'0.15em',
          ...fade(0.7),
        }}>
          <GlitchText>plexly</GlitchText>
        </h1>

        {/* jp subtitle */}
        <div style={{
          fontFamily:"'Zen Antique Soft',serif",
          fontSize:'clamp(0.85rem,1.8vw,1.3rem)',
          color:'rgba(195,110,110,0.55)',letterSpacing:'0.28em',
          marginBottom:'2.8rem',
          ...fade(0.9),
        }}>
          読み人知らず &mdash; unknown author
        </div>

        {/* descriptor */}
        <p style={{
          fontSize:'0.82rem',letterSpacing:'0.12em',lineHeight:2.0,
          color:'rgba(155,138,148,0.52)',maxWidth:400,marginBottom:'3.2rem',
          ...fade(1.1),
        }}>
          security researcher · linux · pentesting<br/>
          <span style={{color:'rgba(130,115,130,0.35)'}}>building things in the dark</span>
        </p>

        {/* CTAs */}
        <div style={{display:'flex',gap:'1.1rem',flexWrap:'wrap',...fade(1.3)}}>
          <Btn label="view work" primary />
          <Btn label="contact"   primary={false} />
        </div>
      </main>

      {/* ── bottom-right lyric ── */}
      <div style={{
        position:'fixed',bottom:'2.4rem',right:'3.5rem',
        textAlign:'right',pointerEvents:'none',
        opacity: loaded?1:0, transition:'opacity 2s ease 2.2s',
      }}>
        <div style={{
          fontFamily:"'Zen Antique Soft',serif",
          fontSize:'0.7rem',color:'rgba(175,130,130,0.22)',
          letterSpacing:'0.16em',lineHeight:2,
          animation:'flicker 13s infinite 4s',
        }}>どうかこのまま時間を止めて</div>
        <div style={{fontSize:'0.6rem',color:'rgba(140,118,125,0.15)',letterSpacing:'0.1em',marginTop:2}}>
          please stop time like this
        </div>
      </div>

      {/* ── bottom-left hint ── */}
      <div style={{
        position:'fixed',bottom:'2.4rem',left:'3.5rem',
        fontSize:'0.58rem',color:'rgba(115,98,108,0.28)',
        letterSpacing:'0.2em',textTransform:'uppercase',pointerEvents:'none',
        opacity: loaded?1:0, transition:'opacity 2s ease 2.8s',
      }}>
        click anywhere
      </div>

    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
